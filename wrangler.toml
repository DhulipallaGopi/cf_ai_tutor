name = "cf-ai-tutor"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "TUTOR_DO"
class_name = "TutorDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TutorDO"]

[[workflows]]
binding = "STUDY_PLAN_WF"
name = "study-plan-wf"
class_name = "StudyPlanWorkflow"
